name: Run smoketest
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        type: choice
        options:
          - dev
          - qa
      branch:
        description: 'Branch to run from (default: current)'
        required: false
        type: string
        default: ''
jobs:
  smoketest:
    name: Smoketest (${{ inputs.environment }})
    runs-on: ubuntu-24.04
    env:
      TZ: Europe/Helsinki
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.branch || github.ref }}

      - name: Setup Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd smoketests
          npm ci

      - name: Install Puppeteer browser
        run: |
          cd smoketests
          npx puppeteer browsers install chrome

      - name: Run smoketest
        run: |
          cd smoketests
          npm run smoketest:${{ inputs.environment }}
